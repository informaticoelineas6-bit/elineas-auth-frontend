name: Deploy Elineas Auth Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/download/2024.1.4/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Configure SSH with cloudflared proxy
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.SERVER_HOST }}
            ProxyCommand cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }}
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/soporte/servidor/proyectos/elineas-auth-frontend
            git pull origin main
            docker compose -f docker-compose.prod.yml build frontend
            docker compose -f docker-compose.prod.yml up -d frontend
            docker image prune -f
