name: Deploy Elineas Auth Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/download/2024.1.4/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure SSH with cloudflared proxy
        run: |
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.SERVER_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            User ${{ secrets.SERVER_USER }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: |
          ssh ${{ secrets.SERVER_HOST }} << 'DEPLOY_SCRIPT'
          set -e
          cd /home/soporte/servidor/proyectos/elineas-auth-frontend
          git pull origin main
          docker compose -f docker-compose.prod.yml build frontend
          docker compose -f docker-compose.prod.yml up -d frontend
          docker image prune -f
          DEPLOY_SCRIPT
