services:
  frontend:
    build:
      context: .
      target: prod
    image: elineas-auth-frontend
    container_name: elineas-auth-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - elineas-auth

networks:
  elineas-auth:
    name: elineas-auth-api
    external: true
